{% extends 'core_admin/base_admin.html' %}

{% block content %}
<style>
    .form-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .form-card {
        background: white; border-radius: 20px; padding: 32px;
        width: 100%; max-width: 500px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .form-card h2 { margin: 0 0 8px 0; color: #1f2937; font-size: 24px; }
    .form-card .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #f3f4f6; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
    .form-control {
        width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb;
        border-radius: 12px; font-family: inherit; font-size: 14px;
        transition: all 0.2s; background: #f9fafb;
    }
    .form-control:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
    .error-message {
        background: #fee2e2; color: #991b1b; padding: 12px 16px;
        border-radius: 12px; margin-bottom: 20px; border-right: 3px solid #ef4444;
    }
    .btn-submit {
        width: 100%; padding: 12px; background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white; border: none; border-radius: 12px; font-size: 15px;
        font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99,102,241,0.3); }
    .form-footer { margin-top: 20px; text-align: center; font-size: 13px; }
    .form-footer a { color: #6366f1; text-decoration: none; }
</style>

<div class="form-container">
    <div class="form-card">
        <h2>{{ page_title }}</h2>
        <div class="subtitle">اطلاعات کاربر جدید را وارد کنید</div>
        {% if error %}
        <div class="error-message">⚠️ {{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label>نام</label><input type="text" name="first_name" class="form-control" required></div>
            <div class="form-group"><label>نام خانوادگی</label><input type="text" name="last_name" class="form-control" required></div>
            <div class="form-group"><label>نام کاربری</label><input type="text" name="username" class="form-control" required></div>
            <div class="form-group"><label>رمز عبور</label><input type="password" name="password" class="form-control" required></div>
            <button type="submit" class="btn-submit">{{ button_text }}</button>
        </form>
        <div class="form-footer"><a href="{% url 'core_admin:dashboard' %}">↩️ بازگشت به داشبورد</a></div>
    </div>
</div>
{% endblock %}
