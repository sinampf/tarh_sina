{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ورود به پنل مدیریت</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-icon { font-size: 48px; margin-bottom: 16px; }
        .login-header h1 { color: #1f2937; font-size: 24px; margin-bottom: 8px; }
        .login-header p { color: #6b7280; font-size: 14px; }
        .error-message {
            background: #fee2e2; color: #991b1b; padding: 12px 16px;
            border-radius: 12px; margin-bottom: 24px; border-right: 3px solid #ef4444;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
        .form-control {
            width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb;
            border-radius: 12px; font-family: inherit; font-size: 14px;
            transition: all 0.2s; background: #f9fafb;
        }
        .form-control:focus {
            outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
            background: white;
        }
        .btn-login {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white; border: none; border-radius: 12px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99,102,241,0.4); }
        .login-footer { margin-top: 24px; text-align: center; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="login-icon">⚙️</div>
        <h1>پنل مدیریت</h1>
        <p>لطفاً اطلاعات خود را وارد کنید</p>
    </div>
    {% if error %}
    <div class="error-message">⚠️ {{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>نام کاربری</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label>رمز عبور</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn-login">ورود به پنل مدیریت</button>
    </form>
    <div class="login-footer">فقط برای مدیران سیستم</div>
</div>
</body>
</html>
