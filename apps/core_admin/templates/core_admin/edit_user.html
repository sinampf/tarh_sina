{% extends 'core_admin/base_admin.html' %}

{% block content %}
<style>
    .form-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
    .form-card {
        background: white; border-radius: 20px; padding: 32px;
        width: 100%; max-width: 500px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .form-card h2 { margin: 0 0 8px 0; color: #1f2937; font-size: 24px; }
    .form-card .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #f3f4f6; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
    .form-control {
        width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb;
        border-radius: 12px; font-family: inherit; font-size: 14px;
        transition: all 0.2s; background: #f9fafb;
    }
    .form-control:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
    .info-box {
        background: #eff6ff; border-right: 3px solid #3b82f6;
        padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; color: #1e40af;
    }
    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-save {
        flex: 1; padding: 12px; background: linear-gradient(135deg, #10b981, #059669);
        color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-cancel {
        flex: 1; padding: 12px; background: #f3f4f6; color: #4b5563;
        border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
        cursor: pointer; text-decoration: none; text-align: center;
    }
</style>

<div class="form-container">
    <div class="form-card">
        <h2>✏️ ویرایش کاربر</h2>
        <div class="subtitle">اطلاعات کاربر را ویرایش کنید</div>
        <div class="info-box">🔹 در حال ویرایش: <strong>{{ user.username }}</strong></div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group"><label>نام</label><input type="text" name="first_name" value="{{ user.first_name }}" class="form-control"></div>
            <div class="form-group"><label>نام خانوادگی</label><input type="text" name="last_name" value="{{ user.last_name }}" class="form-control"></div>
            <div class="form-group"><label>نام کاربری</label><input type="text" name="username" value="{{ user.username }}" class="form-control" required></div>
            <div class="form-group"><label>ایمیل</label><input type="email" name="email" value="{{ user.email }}" class="form-control"></div>
            <div class="form-actions">
                <button type="submit" class="btn-save">💾 ذخیره تغییرات</button>
                <a href="{% url 'core_admin:dashboard' %}" class="btn-cancel">↩️ انصراف</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
